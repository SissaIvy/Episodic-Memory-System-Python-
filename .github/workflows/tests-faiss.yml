name: CI - tests (with optional FAISS)

on:
  pull_request:
    branches: [ feat/faiss-smoke-tests ]
  push:
    branches: [ feat/faiss-smoke-tests ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (with faiss extras)
        run: |
          python -m pip install -U pip
          pip install -e ".[faiss]"

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/src" >> $GITHUB_ENV

      - name: Run tests
        run: |
          python -m pytest -q
